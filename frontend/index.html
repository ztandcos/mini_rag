<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini RAG — 智能知识库</title>
<style>
  /* ══════════════════════════════════════════════════════════════════════
     Design System
     ══════════════════════════════════════════════════════════════════════ */
  :root {
    --bg-deep: #07090f;
    --bg-surface: #0d111c;
    --bg-card: #131827;
    --bg-elevated: #1a2035;
    --bg-hover: #1f2740;
    --border-subtle: rgba(108, 140, 255, 0.08);
    --border: rgba(108, 140, 255, 0.15);
    --border-hover: rgba(108, 140, 255, 0.3);
    --text-primary: #e8ecf4;
    --text-secondary: #949ab8;
    --text-tertiary: #5c6382;
    --accent: #6c8cff;
    --accent-soft: rgba(108, 140, 255, 0.12);
    --accent-glow: rgba(108, 140, 255, 0.08);
    --gradient-1: linear-gradient(135deg, #6c8cff, #a78bfa);
    --gradient-2: linear-gradient(135deg, #0d111c 0%, #131827 100%);
    --gradient-bg: radial-gradient(ellipse at 20% 50%, rgba(108, 140, 255, 0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 50%, rgba(167, 139, 250, 0.03) 0%, transparent 60%);
    --success: #34d399;
    --success-bg: rgba(52, 211, 153, 0.1);
    --warning: #fbbf24;
    --warning-bg: rgba(251, 191, 36, 0.1);
    --error: #f87171;
    --error-bg: rgba(248, 113, 113, 0.1);
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    --font-mono: "SF Mono", "Fira Code", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::selection {
    background: rgba(108, 140, 255, 0.3);
    color: #fff;
  }

  /* ══════════════════════════════════════════════════════════════════════
     Layout
     ══════════════════════════════════════════════════════════════════════ */
  .app {
    display: flex;
    height: 100vh;
    background: var(--gradient-bg), var(--bg-deep);
  }

  /* ── Sidebar ───────────────────────────────────────────────────────── */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: -1px;
    width: 1px;
    height: 100%;
    background: linear-gradient(180deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    background: linear-gradient(180deg, rgba(108,140,255,0.04) 0%, transparent 100%);
    border-bottom: 1px solid var(--border-subtle);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: var(--gradient-1);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    box-shadow: 0 4px 12px rgba(108, 140, 255, 0.3);
  }

  .brand-text h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-text .subtitle {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 400;
    -webkit-text-fill-color: var(--text-tertiary);
  }

  .connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .connection-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    transition: var(--transition);
    position: relative;
  }

  .connection-status .dot.online {
    background: var(--success);
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
  }

  .connection-status .dot.offline {
    background: var(--error);
    box-shadow: 0 0 8px rgba(248, 113, 113, 0.4);
  }

  .connection-status .dot.connecting {
    background: var(--warning);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Upload ─────────────────────────────────────────────────────────── */
  .upload-section {
    padding: 16px 20px;
  }

  .dropzone {
    position: relative;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    background: var(--bg-card);
    overflow: hidden;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gradient-1);
    opacity: 0;
    transition: var(--transition);
  }

  .dropzone:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }

  .dropzone.dragover {
    border-color: var(--accent);
    border-style: solid;
    background: var(--accent-soft);
    transform: scale(1.01);
  }

  .dropzone input[type="file"] { display: none; }

  .dropzone .icon {
    position: relative;
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
    transition: var(--transition);
  }

  .dropzone:hover .icon {
    transform: translateY(-2px);
  }

  .dropzone .label {
    position: relative;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .dropzone .label span {
    color: var(--accent);
  }

  .dropzone .hint {
    position: relative;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  /* ── Documents ──────────────────────────────────────────────────────── */
  .doc-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .doc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 8px;
  }

  .doc-header h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .doc-header .doc-count {
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-elevated);
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .doc-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 8px;
  }

  .doc-list::-webkit-scrollbar { width: 3px; }
  .doc-list::-webkit-scrollbar-track { background: transparent; }
  .doc-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .doc-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    cursor: default;
    font-size: 13px;
    background: var(--bg-card);
    border: 1px solid transparent;
  }

  .doc-card:hover {
    background: var(--bg-hover);
    border-color: var(--border-subtle);
    transform: translateX(2px);
  }

  .doc-card .file-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: var(--bg-elevated);
  }

  .doc-card .doc-info {
    flex: 1;
    min-width: 0;
  }

  .doc-card .doc-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .doc-card .doc-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .doc-card .doc-status {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.2px;
    flex-shrink: 0;
  }

  .doc-status.uploaded {
    background: var(--warning-bg);
    color: var(--warning);
  }
  .doc-status.ingested {
    background: var(--success-bg);
    color: var(--success);
  }
  .doc-status.error {
    background: var(--error-bg);
    color: var(--error);
  }

  .doc-card .doc-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-tertiary);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    border-radius: 4px;
    transition: var(--transition);
    line-height: 1;
  }

  .doc-card:hover .doc-delete { opacity: 1; }
  .doc-card .doc-delete:hover {
    color: var(--error);
    background: var(--error-bg);
  }

  .empty-docs {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-tertiary);
    font-size: 13px;
    line-height: 1.6;
  }

  .empty-docs .empty-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  /* ── Bottom Bar ─────────────────────────────────────────────────────── */
  .sidebar-bottom {
    padding: 12px 16px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 8px;
    background: var(--bg-surface);
  }

  .btn {
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: var(--font);
    letter-spacing: 0.2px;
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
  }

  .btn-primary {
    background: var(--gradient-1);
    color: #fff;
    flex: 1;
    box-shadow: 0 2px 8px rgba(108, 140, 255, 0.25);
  }

  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 4px 16px rgba(108, 140, 255, 0.35);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
  }

  .btn-secondary:hover:not(:disabled) {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  /* ══════════════════════════════════════════════════════════════════════
     Chat Area
     ══════════════════════════════════════════════════════════════════════ */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-topbar {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(13, 17, 28, 0.8);
    backdrop-filter: blur(12px);
  }

  .chat-topbar h2 {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-topbar .kb-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .chat-topbar .kb-stats span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Messages ───────────────────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: msgIn 0.35s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.end { flex-direction: row-reverse; align-self: flex-end; }
  .msg.start { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    box-shadow: var(--shadow);
  }

  .msg.end .msg-avatar {
    background: var(--gradient-1);
    color: #fff;
  }

  .msg.start .msg-avatar {
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border-subtle);
  }

  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .msg-bubble {
    padding: 12px 18px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
    box-shadow: var(--shadow);
  }

  .msg.end .msg-bubble {
    background: var(--gradient-1);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.start .msg-bubble {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border-subtle);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-tertiary);
    padding: 0 4px;
  }

  .msg.end .msg-time { text-align: right; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 2px 0;
  }

  .token-badge {
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--bg-elevated);
    padding: 1px 8px;
    border-radius: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.2px;
    border: 1px solid var(--border-subtle);
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  /* ── Markdown in messages ────────────────────────────────────────────── */
  .msg-bubble strong, .msg-bubble b { font-weight: 700; }

  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(0,0,0,0.2);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .msg-bubble pre {
    margin: 8px 0;
    padding: 12px 16px;
    background: rgba(0,0,0,0.35);
    border-radius: var(--radius-sm);
    overflow-x: auto;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .msg-bubble pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.6;
  }
  .msg.end .msg-bubble code {
    background: rgba(255,255,255,0.15);
  }

  /* ── Headings ────────────────────────────────────────────────────────── */
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3,
  .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 {
    margin: 12px 0 6px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }
  .msg-bubble h1 { font-size: 16px; }
  .msg-bubble h2 { font-size: 15px; }
  .msg-bubble h3 { font-size: 14px; }
  .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 { font-size: 13px; }
  .msg-bubble h1:first-child, .msg-bubble h2:first-child { margin-top: 0; }

  /* ── Paragraphs ──────────────────────────────────────────────────────── */
  .msg-bubble p {
    margin: 6px 0;
  }
  .msg-bubble p:first-child { margin-top: 0; }
  .msg-bubble p:last-child { margin-bottom: 0; }

  /* ── Lists ───────────────────────────────────────────────────────────── */
  .msg-bubble ul, .msg-bubble ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .msg-bubble ul:first-child, .msg-bubble ol:first-child { margin-top: 0; }
  .msg-bubble li {
    margin: 3px 0;
    line-height: 1.6;
  }
  .msg-bubble li::marker {
    color: var(--accent);
  }

  /* ── Blockquotes ─────────────────────────────────────────────────────── */
  .msg-bubble blockquote {
    margin: 8px 0;
    padding: 6px 12px;
    border-left: 3px solid var(--accent);
    background: rgba(108, 140, 255, 0.06);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  /* ── Horizontal Rules ────────────────────────────────────────────────── */
  .msg-bubble hr {
    margin: 12px 0;
    border: none;
    height: 1px;
    background: var(--border-subtle);
  }

  /* ── Links ───────────────────────────────────────────────────────────── */
  .msg-bubble a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: rgba(108, 140, 255, 0.3);
    text-underline-offset: 2px;
    transition: var(--transition);
  }
  .msg-bubble a:hover {
    text-decoration-color: var(--accent);
  }
  .msg.end .msg-bubble a {
    color: rgba(255,255,255,0.9);
    text-decoration-color: rgba(255,255,255,0.3);
  }
  .msg.end .msg-bubble a:hover {
    text-decoration-color: #fff;
  }

  /* ── Sources ─────────────────────────────────────────────────────────── */
  .sources-box {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-top: 6px;
  }

  .sources-box summary {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .sources-box summary:hover {
    background: var(--accent-soft);
  }

  .sources-box .source-item {
    padding: 8px 12px;
    border-top: 1px solid var(--border-subtle);
  }

  .sources-box .source-file {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .sources-box .source-text {
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Agent Thought ──────────────────────────────────────────────────── */
  .thought-box {
    background: rgba(251, 191, 36, 0.04);
    border: 1px solid rgba(251, 191, 36, 0.1);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-top: 4px;
  }

  .thought-box summary {
    padding: 6px 12px;
    cursor: pointer;
    font-size: 11px;
    color: var(--warning);
    user-select: none;
  }

  .thought-box summary:hover {
    background: rgba(251, 191, 36, 0.06);
  }

  .thought-box .thought-content {
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-tertiary);
    border-top: 1px solid rgba(251, 191, 36, 0.1);
    font-family: var(--font-mono);
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
  }

  /* ── Loading ─────────────────────────────────────────────────────────── */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }

  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-tertiary);
    animation: bounce 1.5s ease-in-out infinite;
  }

  .typing span:nth-child(1) { animation-delay: -0.3s; }
  .typing span:nth-child(2) { animation-delay: -0.15s; }
  .typing span:nth-child(3) { animation-delay: 0s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0) scale(0.8); opacity: 0.5; }
    40% { transform: translateY(-6px) scale(1); opacity: 1; }
  }

  /* ── Welcome ─────────────────────────────────────────────────────────── */
  .welcome {
    text-align: center;
    padding: 60px 28px;
    max-width: 480px;
    margin: auto;
  }

  .welcome .w-icon {
    width: 72px; height: 72px;
    background: var(--gradient-1);
    border-radius: var(--radius-xl);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
    box-shadow: 0 8px 32px rgba(108, 140, 255, 0.25);
  }

  .welcome h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .welcome-steps {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .welcome-steps .step {
    background: var(--bg-card);
    padding: 16px;
    border-radius: var(--radius);
    width: 140px;
    text-align: center;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
  }

  .welcome-steps .step:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .welcome-steps .step .s-num {
    width: 28px; height: 28px;
    background: var(--gradient-1);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .welcome-steps .step h3 { font-size: 12px; margin-bottom: 4px; }
  .welcome-steps .step p { font-size: 10px; color: var(--text-tertiary); }

  /* ── Input ───────────────────────────────────────────────────────────── */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border-subtle);
    background: var(--bg-surface);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: flex-end;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: var(--transition);
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-wrap textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    outline: none;
    font-family: var(--font);
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
  }

  .input-wrap textarea::placeholder {
    color: var(--text-tertiary);
  }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--gradient-1);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: 4px;
    box-shadow: 0 2px 8px rgba(108, 140, 255, 0.2);
  }

  .send-btn:hover:not(:disabled) {
    box-shadow: 0 4px 16px rgba(108, 140, 255, 0.35);
    transform: scale(1.05);
  }

  .send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }

  /* ── Toast ───────────────────────────────────────────────────────────── */
  .toast-container {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    pointer-events: auto;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #fff;
    font-weight: 500;
    animation: toastIn 0.35s ease;
    max-width: 380px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(12px);
  }

  .toast.success { background: rgba(6, 95, 70, 0.95); }
  .toast.error { background: rgba(127, 29, 29, 0.95); }
  .toast.info { background: rgba(30, 58, 95, 0.95); }

  @keyframes toastIn {
    from { transform: translateX(100%) scale(0.9); opacity: 0; }
    to { transform: translateX(0) scale(1); opacity: 1; }
  }

  /* ══════════════════════════════════════════════════════════════════════
     Responsive
     ══════════════════════════════════════════════════════════════════════ */
  @media (max-width: 820px) {
    .app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      max-height: 45vh;
      border-right: none;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar::after { display: none; }
    .chat-topbar { padding: 12px 16px; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .msg { max-width: 92%; }
    .welcome-steps .step { width: 100%; max-width: 240px; }
  }

  @media (max-width: 480px) {
    .sidebar { max-height: 40vh; }
    .msg { max-width: 96%; }
    .chat-topbar .kb-stats { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">R</div>
        <div class="brand-text">
          <h1>Mini RAG</h1>
          <div class="subtitle">本地智能知识库</div>
        </div>
      </div>
      <div class="connection-status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">初始化中...</span>
      </div>
    </div>

    <div class="upload-section">
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple>
        <span class="icon">📄</span>
        <div class="label">拖拽文件到此处，或<span>点击上传</span></div>
        <div class="hint">支持 .txt .md .pdf</div>
      </div>
    </div>

    <div class="doc-section">
      <div class="doc-header">
        <h2>📚 文档库</h2>
        <span class="doc-count" id="docCount">0</span>
      </div>
      <div class="doc-list" id="docList">
        <div class="empty-docs">
          <span class="empty-icon">📂</span>
          暂无文档<br>上传后即可开始构建知识库
        </div>
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="btn btn-secondary" id="refreshBtn" title="刷新">⟳</button>
      <button class="btn btn-primary" id="ingestBtn" disabled>
        ⚡ 导入知识库
      </button>
    </div>
  </aside>

  <!-- ═══ Chat ═══ -->
  <main class="chat">
    <div class="chat-topbar">
      <h2>💬 智能问答</h2>
      <div class="kb-stats">
        <span id="statDocs">📄 0</span>
        <span id="statChunks">🧩 0</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="w-icon">🤖</div>
        <h2>欢迎使用智能知识库</h2>
        <p>上传文档 → 导入知识库 → 开始提问，三步即可获得基于你私有知识的智能回答</p>
        <div class="welcome-steps">
          <div class="step">
            <div class="s-num">1</div>
            <h3>📤 上传文档</h3>
            <p>拖拽或点击上传</p>
          </div>
          <div class="step">
            <div class="s-num">2</div>
            <h3>⚡ 导入索引</h3>
            <p>自动构建向量库</p>
          </div>
          <div class="step">
            <div class="s-num">3</div>
            <h3>💬 开始提问</h3>
            <p>AI 基于知识回答</p>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="chatInput" rows="1" placeholder="输入你的问题..." disabled></textarea>
        </div>
        <button class="send-btn" id="sendBtn" disabled>➤</button>
      </div>
    </div>
  </main>
</div>

<!-- ═══ Toast ═══ -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Mini RAG — App Logic
// ═══════════════════════════════════════════════════════════════════════════

const API = '/api';
let docs = [];
let busy = false;

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// ── Toast ────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  const c = document.getElementById('toastContainer');
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = '0.3s'; }, 3000);
  setTimeout(() => el.remove(), 3500);
}

// ── API ──────────────────────────────────────────────────────────────────
async function call(method, path, body) {
  const opts = { method, headers: {} };
  if (body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(`${API}${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
  return data;
}

function fmtSize(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

// ── Markdown renderer (lightweight) ──────────────────────────────────────
function renderMarkdown(text) {
  // Escape HTML first
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // ── Code blocks (must be before inline processing) ─────────────────────────
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, _lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${esc(code)}</code></pre>`);
    return `%%CODEBLOCK_${idx}%%`;
  });

  // ── Inline code ────────────────────────────────────────────────────────────
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // ── Headings ───────────────────────────────────────────────────────────────
  html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // ── Horizontal rules ───────────────────────────────────────────────────────
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/^\*\*\*$/gm, '<hr>');

  // ── Blockquotes ────────────────────────────────────────────────────────────
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // ── Unordered lists ────────────────────────────────────────────────────────
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // ── Ordered lists ──────────────────────────────────────────────────────────
  html = html.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => {
    if (!match.includes('<ul>')) return '<ol>' + match + '</ol>';
    return match;
  });

  // ── Bold + italic ──────────────────────────────────────────────────────────
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // ── Links ──────────────────────────────────────────────────────────────────
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // ── Paragraphs ─────────────────────────────────────────────────────────────
  // Normalize multiple newlines
  html = html.replace(/\n{3,}/g, '\n\n');

  const lines = html.split('\n');
  const result = [];
  let inParagraph = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if (trimmed === '') {
      if (inParagraph) { result.push('</p>'); inParagraph = false; }
      continue;
    }

    if (/^<(h[1-6]|ul|ol|li|pre|blockquote|hr|table)/.test(trimmed)) {
      if (inParagraph) { result.push('</p>'); inParagraph = false; }
      result.push(line);
      continue;
    }

    if (!inParagraph) { result.push('<p>'); inParagraph = true; }
    else { result.push('<br>'); }
    result.push(line);
  }
  if (inParagraph) result.push('</p>');
  html = result.join('\n');

  // ── Restore code blocks ────────────────────────────────────────────────────
  codeBlocks.forEach((block, i) => {
    html = html.replace(`%%CODEBLOCK_${i}%%`, block);
  });

  return html;
}

// ── Health ───────────────────────────────────────────────────────────────
async function health() {
  const dot = $('#statusDot');
  const txt = $('#statusText');
  try {
    const h = await call('GET', '/health');
    dot.className = 'dot online';
    txt.textContent = h.llm_configured ? 'LLM 已就绪 · 运行中' : '运行中 · 未配置 LLM';
    $('#statDocs').textContent = `📄 ${h.documents_count}`;
    $('#statChunks').textContent = `🧩 ${h.chunks_count}`;
    return h;
  } catch {
    dot.className = 'dot offline';
    txt.textContent = '无法连接后端';
    return null;
  }
}

// ── Documents ────────────────────────────────────────────────────────────
async function loadDocs() {
  try {
    const data = await call('GET', '/documents');
    docs = data.documents || [];
    renderDocs();
    updateIngestBtn();
  } catch (e) {
    toast('加载文档失败: ' + e.message, 'error');
  }
}

function renderDocs() {
  const el = $('#docList');
  $('#docCount').textContent = docs.length;

  if (!docs.length) {
    el.innerHTML = `<div class="empty-docs"><span class="empty-icon">📂</span>暂无文档<br>上传后即可开始构建知识库</div>`;
    return;
  }

  el.innerHTML = docs.map(d => {
    const icon = d.file_type === 'pdf' ? '📕' : d.file_type === 'md' ? '📝' : '📄';
    const statusClass = d.status === 'ingested' ? 'ingested' : d.status === 'error' ? 'error' : 'uploaded';
    const statusLabel = d.status === 'ingested' ? '已导入' : d.status === 'error' ? '出错' : '待导入';
    return `
      <div class="doc-card" data-id="${d.id}">
        <div class="file-icon">${icon}</div>
        <div class="doc-info">
          <div class="doc-name">${esc(d.filename)}</div>
          <div class="doc-meta">
            <span>${fmtSize(d.file_size)}</span>
            <span>·</span>
            <span>${fmtTime(d.created_at)}</span>
          </div>
        </div>
        <span class="doc-status ${statusClass}">${statusLabel}</span>
        <button class="doc-delete" data-id="${d.id}" title="删除">✕</button>
      </div>
    `;
  }).join('');

  el.querySelectorAll('.doc-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      delDoc(parseInt(btn.dataset.id));
    });
  });
}

function updateIngestBtn() {
  const pending = docs.filter(d => d.status === 'uploaded').length;
  const btn = $('#ingestBtn');
  btn.disabled = pending === 0;
  btn.textContent = pending ? `⚡ 导入 ${pending} 个文档` : '⚡ 全部已导入';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Upload ───────────────────────────────────────────────────────────────
async function uploadFiles(files) {
  let ok = 0;
  for (const f of files) {
    const fd = new FormData();
    fd.append('file', f);
    try {
      await call('POST', '/documents/upload', fd);
      ok++;
    } catch (e) {
      toast(`上传失败 ${f.name}: ${e.message}`, 'error');
    }
  }
  if (ok) {
    toast(`✅ 成功上传 ${ok} 个文件`, 'success');
    await loadDocs();
    await health();
  }
}

// ── Delete ───────────────────────────────────────────────────────────────
async function delDoc(id) {
  if (!confirm('确定删除此文档？')) return;
  try {
    await call('DELETE', `/documents/${id}`);
    toast('🗑️ 文档已删除', 'info');
    await loadDocs();
    await health();
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

// ── Ingest ───────────────────────────────────────────────────────────────
async function ingest() {
  if (busy) return;
  busy = true;
  const btn = $('#ingestBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 导入中...';
  try {
    const r = await call('POST', '/documents/ingest');
    toast(`✅ 导入完成: ${r.documents_processed} 个文档, ${r.chunks_created} 个片段`, 'success');
    setInputEnabled(true);
    await loadDocs();
    await health();
  } catch (e) {
    toast('导入失败: ' + e.message, 'error');
  } finally {
    busy = false;
    updateIngestBtn();
  }
}

// ── Chat ─────────────────────────────────────────────────────────────────
function addMsg(role, content, sources, thought, tokenUsage) {
  const wel = $('#welcome');
  if (wel) wel.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'end' : 'start'}`;

  const avatar = role === 'user' ? '👤' : '🤖';
  const time = fmtTime(new Date().toISOString());

  if (role === 'assistant' && content === '...') {
    wrap.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-body">
        <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>
    `;
    wrap.id = 'loadingMsg';
  } else {
    let html = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-body">
        <div class="msg-bubble">${role === 'assistant' ? renderMarkdown(content) : esc(content)}</div>
        <div class="msg-meta">
          <span class="msg-time">${time}</span>
    `;

    // Token usage badge (assistant only)
    if (role === 'assistant' && tokenUsage && tokenUsage.total_tokens > 0) {
      html += `<span class="token-badge">⚡ ${tokenUsage.total_tokens} tokens</span>`;
    }

    html += `</div>`;  // close msg-meta

    if (sources && sources.length) {
      html += `<details class="sources-box"><summary>📚 ${sources.length} 个参考来源</summary>`;
      sources.forEach(s => {
        html += `<div class="source-item">
          <div class="source-file">📄 ${esc(s.filename)}</div>
          <div class="source-text">${esc(s.content)}</div>
        </div>`;
      });
      html += `</details>`;
    }

    if (thought) {
      try {
        const parsed = JSON.parse(thought);
        const steps = parsed.map(s => `[Turn ${s.turn}] ${s.tool}(${JSON.stringify(s.arguments)})`).join('\n');
        html += `<details class="thought-box"><summary>🧠 Agent 思考过程</summary>
          <div class="thought-content">${esc(steps)}</div>
        </details>`;
      } catch {
        html += `<details class="thought-box"><summary>🧠 Agent 思考过程</summary>
          <div class="thought-content">${esc(thought)}</div>
        </details>`;
      }
    }

    html += `</div>`;
    wrap.innerHTML = html;
  }

  const msgs = $('#messages');
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

async function send() {
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text || busy) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  busy = true;
  $('#sendBtn').disabled = true;
  input.disabled = true;

  const loading = addMsg('assistant', '...');

  try {
    const r = await call('POST', '/agent/chat', { message: text });
    loading.remove();
    addMsg('assistant', r.answer, r.sources, r.agent_thought, r.token_usage);
  } catch (e) {
    loading.remove();
    addMsg('assistant', `❌ 请求失败: ${e.message}`);
  } finally {
    busy = false;
    $('#sendBtn').disabled = false;
    input.disabled = false;
    input.focus();
  }
}

function setInputEnabled(enabled) {
  $('#chatInput').disabled = !enabled;
  $('#sendBtn').disabled = !enabled;
  $('#chatInput').placeholder = enabled ? '输入你的问题...' : '请先导入文档到知识库...';
}

// ── Init ─────────────────────────────────────────────────────────────────
async function init() {
  const h = await health();
  await loadDocs();
  const hasIngested = docs.some(d => d.status === 'ingested');
  setInputEnabled(hasIngested);
}

// ── Events ───────────────────────────────────────────────────────────────

// Upload
$('#dropzone').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', () => {
  if ($('#fileInput').files.length) {
    uploadFiles($('#fileInput').files);
    $('#fileInput').value = '';
  }
});

// Drag & drop
const dz = $('#dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});

// Ingest
$('#ingestBtn').addEventListener('click', ingest);

// Refresh
$('#refreshBtn').addEventListener('click', init);

// Send
$('#sendBtn').addEventListener('click', send);
$('#chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
$('#chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Go
init();
</script>
</body>
</html>
