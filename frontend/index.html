<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini RAG — 本地知识库</title>
<style>
  /* ════════════════════════════════════════════════════════
     CSS Variables & Reset
     ════════════════════════════════════════════════════════ */
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-tertiary: #242836;
    --bg-hover: #2d3243;
    --border: #2d3243;
    --text-primary: #e4e6f0;
    --text-secondary: #8b8fa3;
    --text-muted: #5c6072;
    --accent: #6c8cff;
    --accent-hover: #8ba4ff;
    --accent-glow: rgba(108, 140, 255, 0.15);
    --success: #34d399;
    --warning: #fbbf24;
    --error: #f87171;
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.2s ease;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* ════════════════════════════════════════════════════════
     Layout
     ════════════════════════════════════════════════════════ */
  .app-container {
    display: flex;
    height: 100vh;
  }

  /* ── Sidebar ──────────────────────────────────────────── */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-header h1 .logo {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    margin-left: 38px;
  }

  .sidebar-header .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
    margin-left: 38px;
  }

  .sidebar-header .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .sidebar-header .status-dot.online { background: var(--success); }
  .sidebar-header .status-dot.offline { background: var(--error); }

  /* ── Upload Area ──────────────────────────────────────── */
  .upload-area {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .upload-dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
  }

  .upload-dropzone:hover,
  .upload-dropzone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .upload-dropzone input[type="file"] {
    display: none;
  }

  .upload-dropzone .icon {
    font-size: 24px;
    margin-bottom: 6px;
    display: block;
  }

  .upload-dropzone .label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .upload-dropzone .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Document List ────────────────────────────────────── */
  .doc-list-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .doc-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px 8px;
  }

  .doc-list-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .doc-list-header .count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .doc-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 12px;
  }

  .doc-list::-webkit-scrollbar {
    width: 4px;
  }
  .doc-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .doc-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    cursor: default;
    font-size: 13px;
  }

  .doc-item:hover {
    background: var(--bg-hover);
  }

  .doc-item .file-icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
  }

  .doc-item .info {
    flex: 1;
    min-width: 0;
  }

  .doc-item .name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
  }

  .doc-item .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .doc-item .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .status-badge.uploaded {
    background: rgba(251, 191, 36, 0.15);
    color: var(--warning);
  }
  .status-badge.ingested {
    background: rgba(52, 211, 153, 0.15);
    color: var(--success);
  }
  .status-badge.error {
    background: rgba(248, 113, 113, 0.15);
    color: var(--error);
  }

  .doc-item .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    transition: var(--transition);
    line-height: 1;
  }

  .doc-item:hover .delete-btn {
    opacity: 1;
  }

  .doc-item .delete-btn:hover {
    color: var(--error);
  }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 8px; display: block; }

  /* ── Ingest Button Bar ────────────────────────────────── */
  .ingest-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
    justify-content: center;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }

  .btn-secondary:hover:not(:disabled) {
    background: var(--bg-hover);
  }

  /* ════════════════════════════════════════════════════════
     Main Chat Area
     ════════════════════════════════════════════════════════ */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-header h2 {
    font-size: 15px;
    font-weight: 600;
  }

  .chat-header .stats {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
  }

  .chat-header .stats span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Messages ─────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .messages::-webkit-scrollbar {
    width: 6px;
  }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .message {
    max-width: 80%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
  }

  .message.assistant {
    align-self: flex-start;
  }

  .message .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  .message .time {
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 4px;
  }

  .message.user .time { text-align: right; }

  /* ── Sources ──────────────────────────────────────────── */
  .sources {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(108, 140, 255, 0.06);
    border: 1px solid rgba(108, 140, 255, 0.15);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }

  .sources summary {
    cursor: pointer;
    color: var(--accent);
    font-weight: 500;
    font-size: 12px;
  }

  .sources .source-item {
    padding: 6px 0;
    border-top: 1px solid var(--border);
    margin-top: 6px;
  }

  .sources .source-item:first-child {
    margin-top: 8px;
  }

  .sources .source-filename {
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 11px;
    margin-bottom: 2px;
  }

  .sources .source-content {
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Agent Thought ────────────────────────────────────── */
  .agent-thought {
    margin-top: 6px;
    padding: 6px 12px;
    background: rgba(251, 191, 36, 0.06);
    border: 1px solid rgba(251, 191, 36, 0.12);
    border-radius: var(--radius-sm);
    font-size: 11px;
    color: var(--text-muted);
  }

  .agent-thought summary {
    cursor: pointer;
    color: var(--warning);
    font-weight: 500;
  }

  /* ── Welcome Message ──────────────────────────────────── */
  .welcome {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }

  .welcome .icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  .welcome h2 {
    color: var(--text-secondary);
    font-size: 18px;
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 13px;
    line-height: 1.6;
  }

  .welcome .steps {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .welcome .step {
    background: var(--bg-tertiary);
    padding: 16px 20px;
    border-radius: var(--radius);
    width: 180px;
    text-align: center;
  }

  .welcome .step .num {
    width: 28px; height: 28px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .welcome .step h3 {
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .welcome .step p {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Input Area ───────────────────────────────────────── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-primary);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-row textarea {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    outline: none;
    font-family: var(--font);
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
    transition: var(--transition);
  }

  .input-row textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-row textarea::placeholder {
    color: var(--text-muted);
  }

  .btn-send {
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-send:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .btn-send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ── Loading indicator ────────────────────────────────── */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.4s infinite ease-in-out both;
  }

  .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
  .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); }
    40% { transform: scale(1); }
  }

  /* ════════════════════════════════════════════════════════
     Toast Notifications
     ════════════════════════════════════════════════════════ */
  .toast-container {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #fff;
    animation: slideIn 0.3s ease;
    max-width: 360px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .toast.success { background: #065f46; }
  .toast.error { background: #7f1d1d; }
  .toast.info { background: #1e3a5f; }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ════════════════════════════════════════════════════════
     Responsive
     ════════════════════════════════════════════════════════ */
  @media (max-width: 768px) {
    .sidebar {
      width: 100%;
      min-width: 100%;
      max-height: 50vh;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .app-container {
      flex-direction: column;
    }
    .message { max-width: 90%; }
    .welcome .steps { flex-direction: column; align-items: center; }
    .welcome .step { width: 100%; max-width: 280px; }
  }
</style>
</head>
<body>

<div class="app-container">
  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>
        <span class="logo">R</span>
        Mini RAG
      </h1>
      <div class="subtitle">本地知识库问答系统</div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">检查中...</span>
      </div>
    </div>

    <!-- Upload -->
    <div class="upload-area">
      <div class="upload-dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple>
        <span class="icon">📄</span>
        <div class="label">点击或拖拽文档到此处上传</div>
        <div class="hint">支持 TXT · Markdown · PDF</div>
      </div>
    </div>

    <!-- Document List -->
    <div class="doc-list-section">
      <div class="doc-list-header">
        <h2>文档</h2>
        <span class="count" id="docCount">0</span>
      </div>
      <div class="doc-list" id="docList">
        <div class="empty-state">
          <span class="icon">📂</span>
          还没有上传文档
        </div>
      </div>
    </div>

    <!-- Ingest Button -->
    <div class="ingest-bar">
      <button class="btn btn-secondary" id="refreshBtn" title="刷新文档列表">⟳</button>
      <button class="btn btn-primary" id="ingestBtn" disabled>
        ⚡ 导入到知识库
      </button>
    </div>
  </aside>

  <!-- ═══ Chat Area ═══ -->
  <main class="chat-area">
    <div class="chat-header">
      <h2>💬 对话</h2>
      <div class="stats">
        <span id="statDocs">📄 0 文档</span>
        <span id="statChunks">🧩 0 片段</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <span class="icon">🤖</span>
        <h2>欢迎使用 Mini RAG</h2>
        <p>上传文档后，导入知识库，就可以向我提问了</p>
        <div class="steps">
          <div class="step">
            <div class="num">1</div>
            <h3>📤 上传文档</h3>
            <p>支持 TXT、Markdown、PDF</p>
          </div>
          <div class="step">
            <div class="num">2</div>
            <h3>⚡ 导入知识库</h3>
            <p>自动切片、嵌入、建索引</p>
          </div>
          <div class="step">
            <div class="num">3</div>
            <h3>💬 开始提问</h3>
            <p>AI 会基于知识库回答</p>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="chatInput" rows="1" placeholder="输入你的问题..." disabled></textarea>
        <button class="btn-send" id="sendBtn" disabled>➤</button>
      </div>
    </div>
  </main>
</div>

<!-- ═══ Toast Container ═══ -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// Mini RAG — Frontend App
// ═══════════════════════════════════════════════════════════════

const API_BASE = '/api';

// ── State ──────────────────────────────────────────────────────
let documents = [];
let isProcessing = false;

// ── DOM Refs ───────────────────────────────────────────────────
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const statusDot = $('#statusDot');
const statusText = $('#statusText');
const docList = $('#docList');
const docCount = $('#docCount');
const fileInput = $('#fileInput');
const dropzone = $('#dropzone');
const ingestBtn = $('#ingestBtn');
const refreshBtn = $('#refreshBtn');
const messages = $('#messages');
const welcome = $('#welcome');
const chatInput = $('#chatInput');
const sendBtn = $('#sendBtn');
const statDocs = $('#statDocs');
const statChunks = $('#statChunks');

// ── Toast ──────────────────────────────────────────────────────
function toast(message, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = '0.3s'; }, 3000);
  setTimeout(() => el.remove(), 3500);
}

// ── API Client ─────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(`${API_BASE}${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

// ── Health Check ───────────────────────────────────────────────
async function checkHealth() {
  try {
    const h = await api('GET', '/health');
    statusDot.className = 'status-dot online';
    statusText.textContent = h.llm_configured ? 'LLM 已就绪' : '运行中（未配置 LLM）';
    statDocs.textContent = `📄 ${h.documents_count} 文档`;
    statChunks.textContent = `🧩 ${h.chunks_count} 片段`;
    return h;
  } catch {
    statusDot.className = 'status-dot offline';
    statusText.textContent = '无法连接';
    return null;
  }
}

// ── Load Documents ─────────────────────────────────────────────
async function loadDocuments() {
  try {
    const data = await api('GET', '/documents');
    documents = data.documents || [];
    renderDocuments();
    updateIngestButton();
    return data;
  } catch (e) {
    toast('加载文档失败: ' + e.message, 'error');
    return null;
  }
}

function renderDocuments() {
  if (documents.length === 0) {
    docList.innerHTML = `<div class="empty-state"><span class="icon">📂</span>还没有上传文档</div>`;
    docCount.textContent = '0';
    return;
  }

  docCount.textContent = documents.length;
  docList.innerHTML = documents.map(d => {
    const statusClass = d.status === 'ingested' ? 'ingested' : d.status === 'error' ? 'error' : 'uploaded';
    const icon = d.file_type === 'pdf' ? '📕' : d.file_type === 'md' ? '📝' : '📄';
    return `
      <div class="doc-item" data-id="${d.id}">
        <span class="file-icon">${icon}</span>
        <div class="info">
          <div class="name">${escapeHtml(d.filename)}</div>
          <div class="meta">${formatSize(d.file_size)} · ${formatTime(d.created_at)}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusBadgeText(d.status)}</span>
        <button class="delete-btn" data-id="${d.id}" title="删除">✕</button>
      </div>
    `;
  }).join('');

  // Delete handlers
  docList.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteDocument(parseInt(btn.dataset.id));
    });
  });
}

function statusBadgeText(status) {
  switch(status) {
    case 'uploaded': return '待导入';
    case 'ingested': return '已导入';
    case 'error': return '出错';
    default: return status;
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function updateIngestButton() {
  const pending = documents.filter(d => d.status === 'uploaded').length;
  ingestBtn.disabled = pending === 0;
  ingestBtn.textContent = pending > 0 ? `⚡ 导入 ${pending} 个文档` : '⚡ 全部已导入';
}

// ── Upload ──────────────────────────────────────────────────────
async function uploadFiles(files) {
  let success = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      await api('POST', '/documents/upload', fd);
      success++;
    } catch (e) {
      toast(`上传失败: ${file.name} — ${e.message}`, 'error');
    }
  }
  if (success > 0) {
    toast(`成功上传 ${success} 个文件`, 'success');
    await loadDocuments();
    await checkHealth();
  }
}

// ── Delete ─────────────────────────────────────────────────────
async function deleteDocument(id) {
  if (!confirm('确定要删除这个文档吗？')) return;
  try {
    await api('DELETE', `/documents/${id}`);
    toast('文档已删除', 'success');
    await loadDocuments();
    await checkHealth();
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

// ── Ingest ──────────────────────────────────────────────────────
async function ingestDocuments() {
  if (isProcessing) return;
  isProcessing = true;
  ingestBtn.disabled = true;
  ingestBtn.textContent = '⏳ 导入中...';

  try {
    const result = await api('POST', '/documents/ingest');
    toast(`导入完成: ${result.documents_processed} 个文档, ${result.chunks_created} 个片段`, 'success');
    await loadDocuments();
    await checkHealth();
  } catch (e) {
    toast('导入失败: ' + e.message, 'error');
  } finally {
    isProcessing = false;
    updateIngestButton();
  }
}

// ── Chat ────────────────────────────────────────────────────────
function addMessage(role, content, sources, thought) {
  welcome?.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  if (role === 'assistant' && content === '...') {
    // Loading indicator
    div.innerHTML = `
      <div class="bubble">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>
    `;
    div.id = 'loadingMsg';
  } else {
    let html = `<div class="bubble">${escapeHtml(content)}</div>`;
    html += `<div class="time">${time}</div>`;

    if (sources && sources.length > 0) {
      html += `<details class="sources"><summary>📚 ${sources.length} 个来源</summary>`;
      sources.forEach(s => {
        html += `<div class="source-item">
          <div class="source-filename">📄 ${escapeHtml(s.filename)}</div>
          <div class="source-content">${escapeHtml(s.content)}</div>
        </div>`;
      });
      html += `</details>`;
    }

    if (thought) {
      html += `<details class="agent-thought"><summary>🧠 Agent 思考过程</summary>${escapeHtml(thought)}</details>`;
    }

    div.innerHTML = html;
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || isProcessing) return;

  chatInput.value = '';
  chatInput.style.height = 'auto';
  addMessage('user', text);
  isProcessing = true;
  sendBtn.disabled = true;
  chatInput.disabled = true;

  const loadingEl = addMessage('assistant', '...');

  try {
    const result = await api('POST', '/agent/chat', { message: text });
    loadingEl.remove();
    addMessage('assistant', result.answer, result.sources, result.agent_thought);
  } catch (e) {
    loadingEl.remove();
    addMessage('assistant', `❌ 出错了: ${e.message}`);
  } finally {
    isProcessing = false;
    sendBtn.disabled = false;
    chatInput.disabled = false;
    chatInput.focus();
  }
}

// ── UI State Management ────────────────────────────────────────
function setInputEnabled(enabled) {
  chatInput.disabled = !enabled;
  sendBtn.disabled = !enabled;
  if (enabled) chatInput.placeholder = '输入你的问题...';
  else chatInput.placeholder = '请先上传并导入文档...';
}

async function refreshAll() {
  const health = await checkHealth();
  await loadDocuments();

  // Enable chat only if there are ingested documents OR if LLM is configured for general chat
  const hasIngested = documents.some(d => d.status === 'ingested');
  setInputEnabled(true);
  if (!hasIngested && !health?.llm_configured) {
    setInputEnabled(false);
  }
}

// ── Event Handlers ─────────────────────────────────────────────

// Upload via click
dropzone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    uploadFiles(fileInput.files);
    fileInput.value = '';
  }
});

// Upload via drag & drop
dropzone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => {
  dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    uploadFiles(e.dataTransfer.files);
  }
});

// Ingest
ingestBtn.addEventListener('click', ingestDocuments);

// Refresh
refreshBtn.addEventListener('click', refreshAll);

// Chat send
sendBtn.addEventListener('click', sendMessage);

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

// ── Init ────────────────────────────────────────────────────────
refreshAll();
</script>
</body>
</html>
